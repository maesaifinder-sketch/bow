<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport"
          content="width=device-width, initial-scale=1.0, viewport-fit=cover">

    <title>Shopee Product Finder</title>

    <meta name="theme-color" content="#ff6a00">
    <meta name="description"
          content="Offline Shopee Product Finder">

    <link rel="manifest" href="manifest.json">

    <link rel="stylesheet" href="css/app.css">

    <link rel="apple-touch-icon" href="assets/icon192.png">
</head>

<body>

<header class="topbar">

    <div class="logo">
        📦 Shopee Product Finder
    </div>

</header>

<main class="container">

    <!-- Import -->

    <section class="card">

        <h2>Import CSV</h2>

        <input
            type="file"
            id="csvFile"
            accept=".csv">

        <button id="btnImport">
            Import CSV
        </button>

        <div id="importStatus">
            ยังไม่ได้โหลดข้อมูล
        </div>

    </section>

    <!-- Search -->

    <section class="card">

        <input

            id="searchInput"

            type="text"

            placeholder="ค้นหาชื่อสินค้า...">

    </section>

    <!-- Summary -->

    <section class="summary">

        <div class="summary-box">

            <span>สินค้าทั้งหมด</span>

            <h2 id="totalProducts">
                0
            </h2>

        </div>

        <div class="summary-box">

            <span>ผลลัพธ์</span>

            <h2 id="totalResults">
                0
            </h2>

        </div>

    </section>

    <!-- Product List -->

    <section>

        <div

            id="productGrid"

            class="product-grid">

        </div>

    </section>

</main>

<!-- Loading -->

<div

    id="loading"

    class="loading hidden">

    กำลังโหลด...

</div>

<script src="js/vendor/papaparse.min.js"></script>

<script src="js/database.js"></script>
<script src="js/csvImporter.js"></script>

<script src="js/app.js"></script>

<script>

if ('serviceWorker' in navigator) {

    window.addEventListener('load', () => {

        navigator.serviceWorker.register('service-worker.js');

    });

}

</script>

</body>
</html>
