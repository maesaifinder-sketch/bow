<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport"
          content="width=device-width, initial-scale=1.0, viewport-fit=cover">

    <title>Shopee Product Finder</title>

    <meta name="theme-color" content="#ff6a00">
    <meta name="description"
          content="Offline Shopee Product Finder">

    <link rel="manifest" href="manifest.json">

    <link rel="stylesheet" href="css/app.css">

    <link rel="apple-touch-icon" href="assets/icon192.png">
</head>

<body>

<header class="topbar">

    <div class="logo">
        📦 Shopee Product Finder
    </div>

</header>

<main class="container">

    <!-- Import -->

    <section class="card">

        <h2>Import CSV</h2>

        <input
    type="file"
    id="csvFiles"
    multiple
    accept=".csv">

        <br>

        <button id="btnImport">
            Import CSV
        </button>

        <div id="importStatus">
            ยังไม่ได้โหลดข้อมูล
        </div>

    </section>

    <!-- Search -->

    <!-- Toolbar -->

<section class="card">

    <div class="toolbar">

        <input
            id="searchInput"
            type="text"
            placeholder="ค้นหา ชื่อสินค้า / รหัสสินค้า / ร้านค้า">

        <input
            id="commissionInput"
            type="number"
            placeholder="ค่าคอมขั้นต่ำ %">

        <input
            id="soldInput"
            type="number"
            placeholder="ยอดขายขั้นต่ำ">

        <select id="sortSelect">

            <option value="commission_desc">
                ค่าคอมมาก → น้อย
            </option>

            <option value="sold_desc">
                ยอดขายมาก → น้อย
            </option>

            <option value="price_desc">
                ราคาแพง → ถูก
            </option>

            <option value="price_asc">
                ราคาถูก → แพง
            </option>

        </select>

        <button id="btnExport">

            Export CSV

        </button>

        <button id="btnReset">

            Reset

        </button>
<button id="btnFactoryReset" class="danger">
    รีเซ็ตเป็นค่าเริ่มต้น
</button>
    </div>

</section>

    <!-- Summary -->

    <section class="summary">

        <div class="summary-box">

            <span>สินค้าทั้งหมด</span>

            <h2 id="totalProducts">
                0
            </h2>

        </div>

        <div class="summary-box">

            <span>ผลลัพธ์</span>

            <h2 id="totalResults">
                0
            </h2>

        </div>

    </section>

    <!-- Product List -->

    <section>

    <div id="scrollContainer" class="scroll-container">

    <div id="virtualSpacer"></div>

    <div id="productGrid">

<table class="product-table">

<thead>
<tr>
<th>รูป</th>
<th>สินค้า</th>
<th>ร้านค้า</th>
<th>ราคา</th>
<th>ขาย</th>
<th>ค่าคอม</th>
<th>เปิด</th>
</tr>
</thead>

<tbody id="productBody">
</tbody>

</table>

</div>

<div id="loadMoreStatus"

     class="load-more-status">

</div>

</div>

</section>

<section class="pagination">

    <button

        onclick="prevPage()">

        ◀ ก่อนหน้า

    </button>

    <span id="pageInfo">

        หน้า 1 / 1

    </span>

    <button

        onclick="nextPage()">

        ถัดไป ▶

    </button>

</section>

</main>

<!-- Loading -->

<div

    id="loading"

    class="loading hidden">

    กำลังโหลด...

</div>

<script src="js/vendor/papaparse.min.js"></script>

<script src="js/database.js"></script>
<script src="js/csvImporter.js"></script>

<script src="js/app.js"></script>

<script>

if ('serviceWorker' in navigator) {

    window.addEventListener('load', () => {

        navigator.serviceWorker.register('service-worker.js');

    });

}

</script>

</body>
</html>
